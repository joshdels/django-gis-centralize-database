{% extends "_base.html" %}

{% block content %}
    <div class="card bg-base-100 shadow-sm border border-base-200">
        <div class="card-body">
            <div class="flex items-center gap-4 mb-8">
                <div class="flex items-center justify-center bg-primary text-primary-content rounded-2xl w-14 h-14 shrink-0">
                    <i data-lucide="cloud-upload" class="w-8 h-8"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-black uppercase">Create a New Project</h2>
                    <p class="text-sm opacity-60 mt-1">This will upload a new project repository to your cloud</p>
                </div>
            </div>

            <form method="post" enctype="multipart/form-data" class="space-y-6">
                {% csrf_token %}

                <div class="form-control w-full">
                    <label class="label">
                        <span class="label-text font-bold">Project Name</span>
                    </label>
                    <div class="[&_input]:input [&_input]:input-bordered [&_input]:w-full {% if form.name.errors %} [&_input]:input-error {% endif %}">
                        {{ form.name }}
                    </div>
                    {% if form.name.errors %}
                        <label class="label">
                            <span class="label-text-alt text-error font-bold">{{ form.name.errors|first }}</span>
                        </label>
                    {% endif %}
                </div>

                <div class="form-control w-full">
                    <label class="label">
                        <span class="label-text font-bold">Description</span>
                    </label>
                    <div class="[&_textarea]:textarea [&_textarea]:textarea-bordered [&_textarea]:w-full">
                        {{ form.description }}
                    </div>
                </div>

                <div class="card-actions justify-end items-center gap-4 mt-6">
                    <a href="{% url 'gis_database:dashboard' %}" class="btn btn-ghost">Cancel</a>
                    <button type="submit" class="btn btn-primary px-8">Create New</button>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
